<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>&#9998; GUESTBOOK &mdash; STARHAVEN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen:wght@400;700&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#080612;
    --bg2:#0f0a22;
    --panel:#150f2e;
    --panel2:#1c1440;
    --frame:#4a2fae;
    --frame2:#7b4dff;
    --ink:#eae6ff;
    --dim:#9a8fd4;
    --cyan:#5defb0;
    --sky:#67e8ff;
    --pink:#ff7bd5;
    --gold:#ffd34d;
    --lime:#b6ff5c;
    --red:#ff5d73;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:
      radial-gradient(1100px 700px at 80% -10%, rgba(123,77,255,.22), transparent 60%),
      radial-gradient(900px 600px at 0% 110%, rgba(255,123,213,.12), transparent 55%),
      var(--bg);
    color:var(--ink);
    font-family:"VT323",ui-monospace,monospace;
    font-size:19px;line-height:1.45;
    min-height:100vh;overflow-x:hidden;
  }

  #stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
  #stars i{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:tw 3s infinite ease-in-out;}
  @keyframes tw{0%,100%{opacity:.12;transform:scale(.6)}50%{opacity:.95;transform:scale(1.3)}}
  #rain{position:fixed;inset:0;z-index:1;pointer-events:none;}
  body::after{content:"";position:fixed;inset:0;z-index:50;pointer-events:none;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,.16) 0 1px,transparent 1px 3px);mix-blend-mode:multiply;}
  body::before{content:"";position:fixed;inset:0;z-index:49;pointer-events:none;
    box-shadow:inset 0 0 220px 40px rgba(0,0,0,.7);}

  .page{position:relative;z-index:2;max-width:680px;margin:0 auto;padding:18px 16px 70px;}

  .hero{text-align:center;padding:22px 0 6px;}
  .title{font-family:"Press Start 2P",monospace;font-size:clamp(18px,6.5vw,34px);line-height:1.1;animation:hue 7s linear infinite;}
  .title span{display:inline-block;color:hsl(calc(var(--i)*32 + 200),95%,68%);
    text-shadow:3px 3px 0 #000,0 0 14px currentColor;animation:bob 1.7s ease-in-out infinite;animation-delay:calc(var(--i)*0.07s);}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
  @keyframes hue{to{filter:hue-rotate(360deg)}}
  .tag{font-size:22px;color:var(--gold);margin-top:14px;}
  .tag .cur{animation:blink 1s steps(2) infinite;}
  @keyframes blink{50%{opacity:0}}

  nav{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin:16px 0;}
  nav a{font-family:"Silkscreen",monospace;font-size:12px;text-decoration:none;color:var(--ink);
    background:var(--panel2);border:2px solid var(--frame);padding:7px 11px;transition:.12s;}
  nav a:hover{background:var(--frame);color:#fff;transform:translateY(-2px);box-shadow:0 3px 0 var(--frame2);}
  nav a.here{background:var(--frame);color:#fff;}

  .win{background:var(--panel);border:2px solid var(--frame);box-shadow:0 0 0 2px #000,6px 6px 0 rgba(0,0,0,.5);margin-bottom:14px;}
  .win .bar{background:linear-gradient(90deg,var(--frame),var(--frame2));font-family:"Press Start 2P",monospace;
    font-size:10px;line-height:1.5;padding:9px 11px;display:flex;align-items:center;gap:8px;color:#fff;text-shadow:2px 2px 0 #000;}
  .win .bar .x{margin-left:auto;opacity:.8;}
  .win .body{padding:15px 16px;}

  a{color:var(--gold);text-decoration:none;border-bottom:1px dotted var(--gold);}
  a:hover{color:#fff;}

  .gb input,.gb textarea{width:100%;background:#000;border:2px solid var(--frame);color:var(--ink);
    font-family:"VT323",monospace;font-size:18px;padding:7px 9px;margin-bottom:9px;}
  .gb button{font-family:"Silkscreen",monospace;font-size:11px;padding:9px 16px;color:#fff;cursor:pointer;
    background:linear-gradient(90deg,var(--frame),var(--frame2));border:2px solid #000;}
  .gb button:hover{filter:brightness(1.2);}
  .gb .row{display:flex;gap:9px;}
  .gb .row input{flex:1;}
  .count{font-family:"Silkscreen",monospace;font-size:11px;color:var(--dim);margin:4px 0 14px;}
  .entries .e{border-top:2px dashed var(--frame);padding:10px 0;}
  .entries .who{color:var(--pink);font-family:"Silkscreen",monospace;font-size:12px;}
  .entries .when{color:var(--dim);font-size:15px;float:right;}
  .entries .msg{margin-top:4px;}
  .note{font-size:15px;color:var(--dim);font-style:italic;margin-top:6px;}

  footer{text-align:center;margin-top:24px;font-family:"Silkscreen",monospace;font-size:11px;color:var(--dim);line-height:1.9;}
</style>
</head>
<body>
<div id="stars"></div>
<canvas id="rain"></canvas>

<div class="page">

  <div class="hero">
    <h1 class="title" id="title">GUESTBOOK</h1>
    <div class="tag">&#10022; leave your mark on the stars <span class="cur">_</span></div>
  </div>

  <nav>
    <a href="index.html">home</a>
    <a href="#">about</a>
    <a href="#">projects</a>
    <a href="#">links</a>
    <a class="here" href="guestbook.html">guestbook</a>
  </nav>

  <section class="win gb">
    <div class="bar">sign_here.cgi <span class="x">[ &#215; ]</span></div>
    <div class="body">
      <div class="row">
        <input id="gbName" placeholder="your name&hellip;" maxlength="24">
      </div>
      <textarea id="gbMsg" rows="3" placeholder="say something nice&hellip;" maxlength="240"></textarea>
      <button id="gbSign">&#9998; sign the guestbook</button>
      <p class="note">your signature is saved on the server and stays across reloads.</p>
    </div>
  </section>

  <section class="win">
    <div class="bar">entries.txt <span class="x">[ &#215; ]</span></div>
    <div class="body">
      <div class="count" id="gbCount">&mdash; signatures</div>
      <div class="entries" id="gbList"></div>
    </div>
  </section>

  <footer>
    <div><a href="index.html">&larr; back to starhaven</a></div>
    <div>(c) 2026 [your name] &mdash; handcrafted with &#9829;</div>
  </footer>
</div>

<script>
/* Backend URL — '' for local; your tunnel URL on Netlify (no trailing slash). */
const API = 'https://rykersage.netlify.app';

/* ---- animated NES title ---- */
(function(){
  const t=document.getElementById('title'), s=t.textContent; t.textContent='';
  [...s].forEach(function(ch,i){const sp=document.createElement('span');sp.textContent=ch;sp.style.setProperty('--i',i);t.appendChild(sp);});
})();

/* ---- starfield ---- */
(function(){
  let h=''; for(let i=0;i<90;i++) h+='<i style="left:'+(Math.random()*100)+'%;top:'+(Math.random()*100)+'%;animation-delay:'+(Math.random()*3)+'s"></i>';
  document.getElementById('stars').innerHTML=h;
})();

/* ---- guestbook (saved on the backend, persists across reloads) ---- */
(function(){
  const name=document.getElementById('gbName'), msg=document.getElementById('gbMsg'),
        list=document.getElementById('gbList'), btn=document.getElementById('gbSign'),
        countEl=document.getElementById('gbCount');

  function when(iso){ try{ return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric'}); }catch(_){ return ''; } }

  function render(entries){
    countEl.textContent=entries.length+' signature'+(entries.length===1?'':'s');
    list.innerHTML='';
    if(!entries.length){ list.innerHTML='<div class="e">be the first to sign \u272A</div>'; return; }
    entries.forEach(function(en){
      const e=document.createElement('div'); e.className='e';
      const head=document.createElement('div');
      const who=document.createElement('span'); who.className='who'; who.textContent=en.name;
      const w=document.createElement('span'); w.className='when'; w.textContent=when(en.time);
      head.appendChild(who); head.appendChild(w);
      const m=document.createElement('div'); m.className='msg'; m.textContent=en.message;  // textContent = XSS-safe
      e.appendChild(head); e.appendChild(m); list.appendChild(e);
    });
  }
  async function load(){
    try{ const r=await fetch(API+'/api/guestbook'); render(await r.json()); }
    catch(_){ list.innerHTML='<div class="e">guestbook offline</div>'; countEl.textContent='\u2014 signatures'; }
  }
  btn.addEventListener('click',async function(){
    const n=(name.value||'anonymous').trim(), m=msg.value.trim(); if(!m)return;
    btn.disabled=true;
    try{
      const r=await fetch(API+'/api/guestbook',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({name:n,message:m})});
      if(r.ok){ name.value=''; msg.value=''; load(); }
      else { const e=await r.json().catch(function(){return{};}); alert(e.error||'could not sign'); }
    }catch(_){ alert('could not reach the guestbook'); }
    btn.disabled=false;
  });
  load();
})();

/* ---- rain (honors the disable choice saved on the home page) ---- */
var rain=(function(){
  const cv=document.getElementById('rain'),ctx=cv.getContext('2d');
  let drops=[],raf=null;
  function size(){cv.width=innerWidth;cv.height=innerHeight;}
  function seed(){const k=Math.round(innerWidth/7);drops=Array.from({length:k},function(){
    return{x:Math.random()*cv.width,y:Math.random()*cv.height,l:10+Math.random()*18,s:7+Math.random()*8,o:.12+Math.random()*.3};});}
  function frame(){ctx.clearRect(0,0,cv.width,cv.height);ctx.lineWidth=1;
    for(const d of drops){ctx.strokeStyle='rgba(123,77,255,'+d.o+')';ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.lineTo(d.x,d.y+d.l);ctx.stroke();
      d.y+=d.s;if(d.y>cv.height){d.y=-d.l;d.x=Math.random()*cv.width;}}
    raf=requestAnimationFrame(frame);}
  addEventListener('resize',function(){if(cv.style.display!=='none'){size();seed();}});
  return{start:function(){cv.style.display='block';size();seed();if(!raf)frame();},
         stop:function(){if(raf)cancelAnimationFrame(raf);raf=null;ctx.clearRect(0,0,cv.width,cv.height);cv.style.display='none';}};
})();
(function(){ let off=false; try{off=localStorage.getItem('noRain')==='1';}catch(_){}
  off?rain.stop():rain.start(); })();
</script>
</body>
</html>
